    <style>
        /* =================================================================
           VARIABLES & THEMES (COMIC POP / NEO-BRUTALISM)
           ================================================================= */
        :root {
            /* Light Theme */
            --primary-yellow: #FFD800;
            --bg-color: #FDF9EE;
            --white: #FFFFFF;
            --black: #000000;
            --purple: #7C3AED;
            --text-dark: #1A1A1A;
            
            /* Structural */
            --border-thick: 3px solid var(--black);
            --shadow-comic: 4px 4px 0px var(--black);
            --shadow-comic-lg: 6px 6px 0px var(--black);
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-pill: 50px;
            
            /* User Prefs */
            --font-base: 18px;
            --sepia-l: 90%;
        }

        /* Dark Theme */
        body.theme-dark {
            --bg-color: #121212;
            --white: #1e1e1e;
            --black: #ffffff; 
            --text-dark: #f1f1f1;
            --primary-yellow: #B29700;
            --purple: #9d6aff;
        }

        /* Sepia Theme (ଆଖି ସୁରକ୍ଷା) - Dynamic Lightness */
        body.theme-sepia {
            --bg-color: hsl(40, 45%, var(--sepia-l));
            --white: hsl(40, 45%, calc(var(--sepia-l) + 5%));
            --black: #4A3B2C;
            --text-dark: #4A3B2C;
            --primary-yellow: #E5C300;
            --purple: #6A32C9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Oriya', sans-serif; background-color: var(--bg-color);
            color: var(--text-dark); user-select: none; overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        a { text-decoration: none; color: inherit; }
        button { font-family: inherit; cursor: pointer; outline: none; }
        
        .hidden { display: none !important; }
        .icon { width: 28px; height: 28px; fill: currentColor; }

        /* =================================================================
           LAYOUT CONTAINERS
           ================================================================= */
        .app-container { width: 100%; background-color: var(--bg-color); min-height: 100vh; position: relative; }
        .desktop-content-wrapper { max-width: 1200px; margin: 0 auto; }

        /* =================================================================
           LIBRARY VIEW
           ================================================================= */
        .header-main {
            background-color: var(--primary-yellow); padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100; border-bottom: var(--border-thick);
            transition: background-color 0.3s;
        }
        .header-title { display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: 900; color: var(--black); }
        .header-btn { background: none; border: none; color: var(--black); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .header-btn:active { transform: scale(0.9); }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }

        .search-container { padding: 20px; background: var(--bg-color); max-width: 800px; margin: 0 auto; }
        .search-box { position: relative; width: 100%; }
        .search-input {
            width: 100%; padding: 14px 20px 14px 50px; border: var(--border-thick);
            border-radius: var(--radius-pill); font-size: 16px; font-weight: 700;
            background: var(--white); color: var(--text-dark); box-shadow: var(--shadow-comic); transition: 0.1s;
        }
        .search-input:focus { outline: none; transform: translate(-2px, -2px); box-shadow: var(--shadow-comic-lg); }
        .search-icon-abs { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); width: 24px; height: 24px; color: var(--text-dark); opacity: 0.7; }

        .book-grid { padding: 0 20px 40px 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        @media (min-width: 600px) { .book-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px) { .book-grid { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        .book-card {
            background: var(--white); border: var(--border-thick); border-radius: var(--radius-md);
            box-shadow: var(--shadow-comic); overflow: hidden; display: flex; flex-direction: column;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .book-card:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--black); }

        .card-cover { width: 100%; aspect-ratio: 2/3; background: #eee; border-bottom: var(--border-thick); object-fit: cover; }
        .card-info { padding: 12px; display: flex; flex-direction: column; gap: 5px; }
        .card-title { font-size: 16px; font-weight: 900; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-author { font-size: 12px; font-weight: 700; color: #E91E63; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* =================================================================
           MODALS (Action, Settings, Search)
           ================================================================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 2000;
            display: flex; align-items: center; justify-content: center; padding: 20px;
            opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .comic-modal {
            background: var(--bg-color); width: 100%; max-width: 350px; border: var(--border-thick);
            border-radius: var(--radius-md); box-shadow: var(--shadow-comic-lg); padding: 25px;
            text-align: center; transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh; display: flex; flex-direction: column; overflow-y: auto;
        }
        .modal-overlay.active .comic-modal { transform: scale(1); }

        .comic-modal h3 { font-size: 18px; margin-bottom: 20px; font-weight: 900; color: var(--text-dark); line-height: 1.4; }
        
        .modal-btn {
            width: 100%; padding: 12px; margin-bottom: 12px; border: var(--border-thick);
            border-radius: var(--radius-pill); font-size: 16px; font-weight: 900;
            background: var(--white); color: var(--text-dark); box-shadow: 3px 3px 0px var(--black); transition: 0.1s;
        }
        .modal-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }
        
        .btn-purple { background: var(--purple); color: #fff; }
        .btn-yellow { background: var(--primary-yellow); color: #000; }
        .btn-close { margin-top: 10px; background: #bbb; color: #000; border-color: #000;}

        /* Settings CSS */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .settings-label { text-align: left; font-weight: 900; margin: 10px 0 5px 0; font-size: 14px; color: var(--text-dark); }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 700; text-align: left;}
        
        .sepia-slider-container { padding: 10px; border: 2px dashed var(--black); border-radius: 8px; margin-bottom: 15px; background: var(--white); }
        input[type="range"] { width: 100%; accent-color: var(--purple); cursor: pointer; }

        .search-results-box { flex: 1; overflow-y: auto; text-align: left; margin: 15px 0; border: 2px solid #ccc; border-radius: 8px; padding: 10px; background: var(--white); }
        .search-item { padding: 10px; border-bottom: 1px dashed #ccc; cursor: pointer; font-size: 14px; }
        .search-item:last-child { border-bottom: none; }
        .search-item strong { color: var(--purple); }

        /* Custom Checkbox */
        input[type="checkbox"] {
            appearance: none; width: 40px; height: 20px; background: var(--white);
            border: 2px solid var(--black); border-radius: 20px; position: relative; cursor: pointer; outline: none;
        }
        input[type="checkbox"]::before {
            content: ''; position: absolute; width: 12px; height: 12px; background: var(--black);
            border-radius: 50%; top: 2px; left: 3px; transition: 0.2s;
        }
        input[type="checkbox"]:checked { background: var(--purple); border-color: var(--black); }
        input[type="checkbox"]:checked::before { left: 21px; background: #fff; border: 1px solid var(--black);}

        /* =================================================================
           READER VIEW
           ================================================================= */
        .reader-view { background: var(--bg-color); min-height: 100vh; position: relative; }
        
        .reader-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            padding: 15px 20px; background: var(--bg-color); z-index: 100;
            border-bottom: var(--border-thick); position: sticky; top: 0;
            transition: background-color 0.3s;
        }
        .rh-left { display: flex; gap: 15px; }
        .rh-titles { display: flex; flex-direction: column; }
        .rh-main-title { font-size: 20px; font-weight: 900; line-height: 1.2; }
        .rh-sub-title { font-size: 12px; font-weight: 700; color: #777; margin-top: 4px; }
        
        .rh-actions { display: flex; gap: 15px; }

        .reader-content {
            max-width: 800px; margin: 0 auto; padding: 40px 25px 120px 25px; min-height: 80vh;
        }

        /* Reading Text Formatting */
        .content-p {
            font-size: var(--font-base); line-height: 1.9; font-weight: 500; margin-bottom: 25px;
            color: var(--text-dark); word-wrap: break-word; transition: font-size 0.3s;
        }
        strong, b { font-weight: 900; }
        em, i { font-style: italic; }
        
        .book-page-header {
            font-size: calc(var(--font-base) + 6px); font-weight: 900;
            margin-top: 35px; margin-bottom: 15px; color: var(--text-dark); line-height: 1.4;
        }

        /* First Page Centering */
        .first-page-center {
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .first-page-center .content-p, .first-page-center .book-page-header { text-align: center; }

        .text-purple { color: var(--purple); cursor: pointer; text-decoration: underline; text-decoration-color: rgba(124, 58, 237, 0.4); text-underline-offset: 4px; }
        .reading-active { background-color: rgba(124, 58, 237, 0.2); border-left: 4px solid var(--purple); padding-left: 10px; border-radius: 4px;}

        /* Bottom Controls */
        .reader-bottom {
            position: fixed; bottom: 0; left: 0; width: 100%; display: flex;
            justify-content: space-between; align-items: flex-end; padding: 20px;
            pointer-events: none; z-index: 500;
        }
        .page-counter { font-size: 18px; font-weight: 900; color: var(--text-dark); background: var(--bg-color); padding: 5px 10px; border: var(--border-thick); border-radius: 10px;}
        .fab-audio {
            width: 65px; height: 65px; background: var(--purple); color: #fff;
            border: var(--border-thick); border-radius: 50%; box-shadow: var(--shadow-comic);
            display: flex; align-items: center; justify-content: center; pointer-events: auto;
            transition: 0.2s; cursor: pointer;
        }
        .fab-audio:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0px var(--black); }
        .fab-audio svg { width: 30px; height: 30px; fill: currentColor; }

        .nav-arrows-container {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 0 20px;
            z-index: 400; pointer-events: none;
        }
        .nav-btn {
            width: 50px; height: 50px; background: var(--white); color: var(--text-dark);
            border: var(--border-thick); border-radius: 50%; box-shadow: var(--shadow-comic);
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; transition: opacity 0.4s ease, transform 0.1s; opacity: 1;
        }
        .nav-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px var(--black); }
        .nav-btn.faded { opacity: 0; pointer-events: none; }
        
        .loader { text-align: center; padding: 60px 20px; font-weight: 900; color: var(--purple); font-size: 18px; }

    </style>
</head>

                <div class="page-counter" id="page-indicator">୧ / ୧</div>
                <button class="fab-audio" id="btn-play-audio" onclick="toggleAudio()">
                    <svg viewBox="0 0 24 24" id="audio-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </button>
            </div>
        </div>

        <!-- ==================== BOOK ACTION MODAL (MOBILE ONLY) ==================== -->
        <div id="book-action-modal" class="modal-overlay">
            <div class="comic-modal">
                <h3>ଗୋଟେ ଉତ୍ତମ ଅନୁଭୂତି ପାଇଁ ଏହି ବହିଟି ଓଡ଼ିଆ ଭାଷା ଆପ୍ ରେ ପଢନ୍ତୁ</h3>
                <button class="modal-btn btn-purple" onclick="triggerReadOnline()">ଅନ୍‌ଲାଇନ୍‌ରେ ପଢ଼ନ୍ତୁ</button>
                <button class="modal-btn btn-yellow" onclick="triggerReadInApp()">ଆପ୍‌ରେ ପଢ଼ନ୍ତୁ</button>
                <button class="modal-btn" onclick="triggerShare()">ସେୟାର କରନ୍ତୁ</button>
                <button class="modal-btn btn-close" onclick="closeActionModal()">ବନ୍ଦ କରନ୍ତୁ</button>
            </div>
        </div>

        <!-- ==================== SETTINGS MODAL ==================== -->
        <div id="settings-modal" class="modal-overlay">
            <div class="comic-modal">
                <h3>ସେଟିଂସ୍</h3>
                
                <div class="settings-label">ଅକ୍ଷର ଆକାର </div>
                <div class="settings-grid">
                    <button class="modal-btn" onclick="adjFont(-2)">ଅ- ଛୋଟ</button>
                    <button class="modal-btn" onclick="adjFont(2)">ଅ+ ବଡ</button>
                </div>

                <div class="settings-label">ରଙ୍ଗ</div>
                <button class="modal-btn" onclick="setTheme('light')" style="background:#fff; color:#000;">ଆଲୋକିତ</button>
                <button class="modal-btn" onclick="setTheme('dark')" style="background:#222; color:#fff;">ଅନ୍ଧାରିଆ</button>
                <button class="modal-btn" onclick="setTheme('sepia')" style="background:#F4ECD8; color:#5B4636;">ଆଖି ସୁରକ୍ଷା</button>

                <div id="sepia-slider-wrapper" class="sepia-slider-container hidden">
                    <div class="settings-label" style="text-align:center;">ଆଖି ସୁରକ୍ଷା ରଙ୍ଗ</div>
                    <input type="range" min="70" max="95" id="sepia-intensity" oninput="updateSepia(this.value)">
                </div>

                <div class="settings-label" style="margin-top:15px;">ଅନ୍ୟାନ୍ୟ</div>
                <div class="toggle-row">
                    <span>ତୀର ଦେଖାନ୍ତୁ </span>
                    <input type="checkbox" id="pref-arrows" onchange="updateToggles()">
                </div>
                <div class="toggle-row">
                    <span>ଅଡିଓ ବଟନ୍</span>
                    <input type="checkbox" id="pref-audio" onchange="updateToggles()">
                </div>

                <button class="modal-btn btn-close" onclick="closeSettingsModal()">ବନ୍ଦ କରନ୍ତୁ</button>
            </div>
        </div>

        <!-- ==================== SEARCH IN BOOK MODAL ==================== -->
        <div id="search-modal" class="modal-overlay">
            <div class="comic-modal">
                <h3>ବହି ଭିତରେ ଖୋଜନ୍ତୁ</h3>
                <div class="search-box">
                    <input type="text" id="in-book-search" class="search-input" placeholder="ଶବ୍ଦ ଲେଖନ୍ତୁ..." style="padding-left:20px;">
                </div>
                <div class="search-results-box" id="search-results"></div>
                <button class="modal-btn btn-close" onclick="closeSearchModal()">ବନ୍ଦ କରନ୍ତୁ</button>
            </div>
        </div>

    </div>

    <script>
        const API = { ALL_BOOKS: 'https://sbgb.pages.dev/ବହି/ସବୁ.json', BOOK_BASE: 'https://sbgb.pages.dev/ବହି/ଖାତା/', DEEP_LINK_BASE: 'https://odiabhasa.pages.dev/open?Bahi=' };
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => { if(e.keyCode == 123 || (e.ctrlKey && "IUS".includes(String.fromCharCode(e.keyCode)))) return false; };
        document.addEventListener('copy', e => { e.preventDefault(); e.clipboardData.setData('text/plain', "ଓଡ଼ିଆ ଭାଷା ଆପ୍ ଡାଉନଲୋଡ୍ କରନ୍ତୁ : https://play.google.com/store/apps/details?id=in.sandeep.odiabhasa"); });

        let allBooksData = []; let currentBook = null; let selectedBookId = null; let selectedBookTitle = null; let currentPage = 0;
        let prefs = { fontSize: 18, theme: 'light', showArrows: true, showAudio: true, sepiaLightness: 90 };
        let navTimeout; let synth = window.speechSynthesis; let audioChunks = []; let currentChunkIndex = 0; let isPlaying = false;
        let touchstartX = 0; let touchendX = 0;

        const ui = {
            libView: document.getElementById('library-view'), readView: document.getElementById('reader-view'),
            grid: document.getElementById('book-grid'), loader: document.getElementById('loader'), libSearch: document.getElementById('lib-search-input'),
            modalAction: document.getElementById('book-action-modal'), modalSettings: document.getElementById('settings-modal'), modalSearch: document.getElementById('search-modal'),
            rhMainTitle: document.getElementById('rh-main-title'), rhSubTitle: document.getElementById('rh-sub-title'), pageContent: document.getElementById('page-content'),
            pageInd: document.getElementById('page-indicator'), btnPrev: document.getElementById('btn-prev'), btnNext: document.getElementById('btn-next'),
            navArrowsUI: document.getElementById('nav-arrows-ui'), btnAudio: document.getElementById('btn-play-audio'), audioIcon: document.getElementById('audio-icon'),
            inBookInput: document.getElementById('in-book-search'), searchResults: document.getElementById('search-results'),
            sepiaWrapper: document.getElementById('sepia-slider-wrapper'), sepiaSlider: document.getElementById('sepia-intensity'),
            themeMeta: document.getElementById('theme-color-meta')
        };

        window.onload = () => {
            loadPrefs();
            const params = new URLSearchParams(window.location.search);
            const directBook = params.get('book');
            if (directBook) loadReader(directBook); else fetchLibrary();
            setupNavAutoHider(); setupSwipe();
            ui.libSearch.addEventListener('input', (e) => renderGrid(allBooksData.filter(b => b.destination.toLowerCase().includes(e.target.value.toLowerCase()))));
            ui.inBookInput.addEventListener('keyup', doInBookSearch);
        };

        function goHome() { window.location.href = 'https://imsbg.github.io/odiabhasa/'; }
        const isMobileDevice = () => window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // --- PREFERENCES & DYNAMIC THEME ---
        function loadPrefs() {
            try { const stored = localStorage.getItem('odiaPrefs'); if(stored) prefs = { ...prefs, ...JSON.parse(stored) }; } catch(e){}
            applyPrefs();
            document.getElementById('pref-arrows').checked = prefs.showArrows;
            document.getElementById('pref-audio').checked = prefs.showAudio;
            ui.sepiaSlider.value = prefs.sepiaLightness;
        }
        function savePrefs() { localStorage.setItem('odiaPrefs', JSON.stringify(prefs)); applyPrefs(); }
        function applyPrefs() {
            document.body.className = '';
            if(prefs.theme !== 'light') document.body.classList.add(`theme-${prefs.theme}`);
            document.documentElement.style.setProperty('--font-base', `${prefs.fontSize}px`);
            document.documentElement.style.setProperty('--sepia-l', `${prefs.sepiaLightness}%`);
            
            ui.navArrowsUI.style.display = prefs.showArrows ? 'flex' : 'none';
            ui.btnAudio.style.display = prefs.showAudio ? 'flex' : 'none';
            ui.sepiaWrapper.style.display = prefs.theme === 'sepia' ? 'block' : 'none';

            // SEO / Meta Theme Color Update
            if(prefs.theme === 'dark') ui.themeMeta.content = '#121212';
            else if(prefs.theme === 'sepia') ui.themeMeta.content = `hsl(40, 45%, ${prefs.sepiaLightness}%)`;
            else ui.themeMeta.content = '#FFD800';
        }
        function adjFont(diff) { prefs.fontSize = Math.max(14, Math.min(32, prefs.fontSize + diff)); savePrefs(); }
        function setTheme(t) { prefs.theme = t; savePrefs(); }
        function updateSepia(val) { prefs.sepiaLightness = val; savePrefs(); }
        function updateToggles() { prefs.showArrows = document.getElementById('pref-arrows').checked; prefs.showAudio = document.getElementById('pref-audio').checked; savePrefs(); }

        // --- SEO UPDATER ---
        function updateSEO(title, desc, url) {
            document.title = `${title} | ଓଡ଼ିଆ ପାଠାଗାର`;
            document.querySelector('meta[name="description"]').content = desc;
            document.querySelector('meta[property="og:title"]').content = title;
            document.querySelector('meta[property="og:description"]').content = desc;
            if(url) window.history.pushState({path: url}, '', url);
        }

        // --- MODALS ---
        function openSettingsModal() { ui.modalSettings.classList.add('active'); }
        function closeSettingsModal() { ui.modalSettings.classList.remove('active'); }
        function openSearchModal() { ui.modalSearch.classList.add('active'); ui.searchResults.innerHTML=''; ui.inBookInput.value=''; }
        function closeSearchModal() { ui.modalSearch.classList.remove('active'); }
        function closeActionModal() { ui.modalAction.classList.remove('active'); }

        // --- LIBRARY ---
        async function fetchLibrary() {
            try {
                const res = await fetch(API.ALL_BOOKS); allBooksData = await res.json();
                ui.loader.classList.add('hidden'); renderGrid(allBooksData);
                updateSEO("ଓଡ଼ିଆ ପାଠାଗାର | Odia Bhasa App", "ଆମର ବିଶାଳ ପାଠାଗାରରୁ ମାଗଣାରେ ଓଡ଼ିଆ ବହି ପଢ଼ନ୍ତୁ।", window.location.pathname);
            } catch(e) { ui.loader.innerText = "ତ୍ରୁଟି ହେଲା। ଦୟାକରି ପୁଣି ଚେଷ୍ଟା କରନ୍ତୁ।"; }
        }
        function renderGrid(books) {
            ui.grid.innerHTML = '';
            books.forEach(book => {
                const id = book.destination.split('/').pop().replace('.json', '');
                const card = document.createElement('div'); card.className = 'book-card';
                card.onclick = () => handleBookClick(id, id.replace(/-/g, ' '));
                card.innerHTML = `<img class="card-cover" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Cover"><div class="card-info"><div class="card-title">...</div><div class="card-author">...</div></div>`;
                ui.grid.appendChild(card);
                fetch(book.destination).then(r => r.json()).then(d => {
                    card.querySelector('.card-title').textContent = d.title || 'ଅଜଣା';
                    card.querySelector('.card-author').textContent = d.author || 'Odia Bhasa App';
                    if(d.coverpage) card.querySelector('.card-cover').src = d.coverpage;
                }).catch(() => card.style.display='none');
            });
        }
        function handleBookClick(id, title) {
            selectedBookId = id; selectedBookTitle = title;
            if (isMobileDevice()) ui.modalAction.classList.add('active'); else triggerReadOnline();
        }
        function triggerReadOnline() { closeActionModal(); loadReader(selectedBookId); }
        function triggerReadInApp() { window.location.href = API.DEEP_LINK_BASE + selectedBookId; }
        async function triggerShare() {
            const url = API.DEEP_LINK_BASE + selectedBookId;
            if(navigator.share) try { await navigator.share({ title: selectedBookTitle, url: url }); } catch(e) {}
            else alert("Share Link: " + url);
        }

        // --- READER LOGIC ---
        async function loadReader(id) {
            ui.libView.classList.add('hidden'); ui.readView.classList.remove('hidden');
            ui.pageContent.innerHTML = '<div class="loader">ବହି ଲୋଡ୍ ହେଉଛି...</div>';
            try {
                const res = await fetch(`${API.BOOK_BASE}${id}.json`); currentBook = await res.json();
                ui.rhMainTitle.textContent = currentBook.title; ui.rhSubTitle.textContent = currentBook.author || "Odia Bhasa App";
                updateSEO(currentBook.title, `ପଢନ୍ତୁ ${currentBook.title} - ${currentBook.author || 'ଓଡ଼ିଆ ପାଠାଗାର'} ଙ୍କ ଦ୍ବାରା ଲିଖିତ।`, `?book=${id}`);
                renderPage(0);
            } catch(e) { ui.pageContent.innerHTML = '<div class="loader">ତ୍ରୁଟି ହେଲା। ଦୟାକରି ଫେରିଯାଆନ୍ତୁ।</div>'; }
        }

        function renderPage(idx) {
            stopAudio(); currentPage = idx; const page = currentBook.pages[idx]; let html = '';
            const isIndexPage = (idx === 1 || currentBook.title.includes('ସୂଚୀ'));
            const isFirstPage = (idx === 0);

            if(page && page.content) {
                page.content.forEach((item, i) => {
                    if(item.type === 'header') {
                        let innerText = item.text.replace(/\n/g, '<br>');
                        let headerClass = idx > 1 ? 'book-page-header' : 'content-p'; // Header styling after page 2
                        html += `<div class="${headerClass} ${isIndexPage ? 'text-purple' : ''}" onclick="${isIndexPage ? `findChapterAndGo('${innerText.replace(/<[^>]*>?/gm, '').trim()}')` : ''}">${innerText}</div>`;
                    } else if(item.type === 'paragraph') {
                        let innerText = '';
                        if(item.spans) {
                            innerText = item.spans.map(s => {
                                let txt = s.text.replace(/\n/g, '<br>');
                                if(s.style === 'bold') txt = `<strong>${txt}</strong>`;
                                if(s.style === 'italic') txt = `<em>${txt}</em>`;
                                return txt;
                            }).join('');
                        }
                        if(isIndexPage && innerText.length > 2) {
                            let coreText = innerText.replace(/<br>/g, ' ').replace(/^[୦-୯0-9.\s]+/, '').trim().split(' ')[0];
                            html += `<div class="content-p text-purple" onclick="findChapterAndGo('${coreText}')">${innerText}</div>`;
                        } else {
                            html += `<div class="content-p" id="chunk-${i}">${innerText}</div>`;
                        }
                    }
                });
            }
            
            ui.pageContent.innerHTML = html;
            if(isFirstPage) ui.pageContent.classList.add('first-page-center'); else ui.pageContent.classList.remove('first-page-center');
            
            window.scrollTo(0,0);
            const odiaNum = n => n.toString().replace(/\d/g, d => "୦୧୨୩୪୫୬୭୮୯"[d]);
            ui.pageInd.textContent = `${odiaNum(idx+1)} / ${odiaNum(currentBook.pages.length)}`;
            ui.btnPrev.style.visibility = idx === 0 ? 'hidden' : 'visible';
            ui.btnNext.style.visibility = idx === currentBook.pages.length - 1 ? 'hidden' : 'visible';
            resetNavTimer();
        }

        function changePage(dir) { if(!currentBook) return; const next = currentPage + dir; if(next >= 0 && next < currentBook.pages.length) renderPage(next); }
        function exitReader() { stopAudio(); ui.readView.classList.add('hidden'); ui.libView.classList.remove('hidden'); updateSEO("ଓଡ଼ିଆ ପାଠାଗାର | Odia Bhasa App", "ଆମର ବିଶାଳ ପାଠାଗାରରୁ ମାଗଣାରେ ଓଡ଼ିଆ ବହି ପଢ଼ନ୍ତୁ।", window.location.pathname); }

        function findChapterAndGo(q) {
            if(!q || q.length < 2) return;
            for(let i = 2; i < currentBook.pages.length; i++) if(JSON.stringify(currentBook.pages[i]).includes(q)) { renderPage(i); return; }
        }
        function doInBookSearch() {
            const q = ui.inBookInput.value.trim().toLowerCase(); if(q.length < 2) { ui.searchResults.innerHTML = ''; return; }
            let html = ''; const odiaNum = n => n.toString().replace(/\d/g, d => "୦୧୨୩୪୫୬୭୮୯"[d]);
            currentBook.pages.forEach((p, idx) => { if(JSON.stringify(p).toLowerCase().includes(q)) html += `<div class="search-item" onclick="closeSearchModal(); renderPage(${idx});"><strong>ପୃଷ୍ଠା ${odiaNum(idx+1)}:</strong> ମିଳିଲା...</div>`; });
            ui.searchResults.innerHTML = html || '<div class="search-item">କିଛି ମିଳିଲା ନାହିଁ</div>';
        }

        // --- SWIPE ---
        function setupSwipe() {
            ui.pageContent.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
            ui.pageContent.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleGesture(); }, {passive: true});
        }
        function handleGesture() { const th = 50; if (touchendX < touchstartX - th) changePage(1); if (touchendX > touchstartX + th) changePage(-1); }

        function setupNavAutoHider() { ['mousemove', 'touchstart', 'click', 'scroll'].forEach(evt => document.addEventListener(evt, resetNavTimer, {passive: true})); }
        function resetNavTimer() {
            if(ui.readView.classList.contains('hidden') || !prefs.showArrows) return;
            ui.btnPrev.classList.remove('faded'); ui.btnNext.classList.remove('faded');
            clearTimeout(navTimeout); navTimeout = setTimeout(() => { ui.btnPrev.classList.add('faded'); ui.btnNext.classList.add('faded'); }, 3000);
        }

        // --- AUDIO ---
        function toggleAudio() { isPlaying ? stopAudio() : startAudio(); }
        function startAudio() {
            audioChunks = []; currentChunkIndex = 0;
            ui.pageContent.querySelectorAll('.content-p, .book-page-header').forEach((el, i) => { const txt = el.innerText.trim(); if(txt.length > 0) audioChunks.push({ text: txt, id: el.id || `auto-id-${i}` }); el.id = el.id || `auto-id-${i}`; });
            if(audioChunks.length > 0) playChunk(0);
        }
        function playChunk(idx) {
            if(idx >= audioChunks.length) { stopAudio(); return; } currentChunkIndex = idx;
            document.querySelectorAll('.reading-active').forEach(e => e.classList.remove('reading-active'));
            const activeEl = document.getElementById(audioChunks[idx].id);
            if(activeEl) { activeEl.classList.add('reading-active'); activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            synth.cancel(); const utt = new SpeechSynthesisUtterance(audioChunks[idx].text);
            const voices = synth.getVoices(); let voice = voices.find(v => v.lang.includes('or') || v.name.toLowerCase().includes('odia'));
            if(!voice) voice = voices.find(v => v.lang.includes('hi')); if(voice) utt.voice = voice; utt.rate = 0.9;
            utt.onstart = () => { isPlaying = true; ui.audioIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`; };
            utt.onend = () => { if(isPlaying) playChunk(currentChunkIndex + 1); }; utt.onerror = () => stopAudio();
            synth.speak(utt);
        }
        function stopAudio() { synth.cancel(); isPlaying = false; document.querySelectorAll('.reading-active').forEach(e => e.classList.remove('reading-active')); ui.audioIcon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>`; }
    </script>
</body>
</html>
