<!DOCTYPE html>
<html lang="or">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ଓଡ଼ିଆ ଭାଷା ଆପ୍ - ବିଦ୍ୟାଳୟ ବହି</title>    
    <meta name="author" content="Sandeep Biswal G">
    <meta name="robots" content="index, follow">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e8f5f3; 
            --card-bg: #ffffff;
            --primary-green: #008f68; 
            --text-dark: #334155;
            --text-grey: #64748b;
            --badge-blue-bg: #e0f2fe;
            --badge-blue-text: #0284c7;
            --badge-yellow-bg: #fef9c3;
            --badge-yellow-text: #b45309;
            --badge-red-bg: #ffe4e6;
            --badge-red-text: #e11d48;
            --border-color: #f1f5f9;
            --header-left-border: #06b6d4;
            --shadow-sm: 0 4px 15px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 10px 25px rgba(0, 0, 0, 0.05);
            --shadow-modal: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Baloo Bhaina 2', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px 20px 120px 20px;
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* Prevent scrolling when modal is open */
        body.modal-open {
            overflow: hidden;
        }

        /* Header Section */
        .header-container {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border-left: 8px solid var(--header-left-border);
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left h1 {
            color: var(--primary-green);
            font-size: 2rem;
            line-height: 1.2;
            font-weight: 800;
        }

        .header-left p {
            color: var(--text-grey);
            font-size: 1rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .header-middle {
            display: flex;
            justify-content: center;
        }

        .total-box {
            background: var(--badge-yellow-bg);
            border: 1px solid #fde047;
            padding: 10px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .total-box svg { width: 30px; height: 30px; fill: var(--badge-yellow-text); }
        .total-info { display: flex; flex-direction: column; line-height: 1.2; }
        .total-title { font-size: 0.85rem; font-weight: 700; color: var(--badge-yellow-text); }
        .total-number { font-size: 1.6rem; font-weight: 800; color: var(--badge-yellow-text); }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .live-badge {
            background: var(--badge-red-bg);
            color: var(--badge-red-text);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .dot {
            width: 8px; height: 8px;
            background-color: var(--badge-red-text);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(225, 29, 72, 0); }
            100% { box-shadow: 0 0 0 0 rgba(225, 29, 72, 0); }
        }

        .datetime-text { color: var(--text-grey); font-size: 0.85rem; font-weight: 500; }

        @media (max-width: 767px) {
            .header-container { text-align: center; justify-content: center; border-left: none; border-top: 8px solid var(--header-left-border); }
            .header-right { align-items: center; }
        }

        /* Grid Layout for Cards */
        .grid-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr; 
        }

        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }

        /* Normal Cards */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-sm);
            padding: 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            border: 1px solid transparent;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--badge-blue-bg);
            background: #fdfdfd;
        }

        .card-title-area { display: flex; flex-direction: column; gap: 8px; }
        .card-title { color: var(--primary-green); font-size: 1.3rem; font-weight: 800; line-height: 1; }
        .card-stats { display: flex; align-items: center; gap: 10px; }
        .stat-number { background: var(--badge-blue-bg); color: var(--badge-blue-text); font-weight: 700; font-size: 1.1rem; padding: 2px 10px; border-radius: 8px; }
        .stat-text { color: var(--text-grey); font-size: 1rem; font-weight: 600; }
        
        .forward-icon { width: 24px; height: 24px; fill: var(--primary-green); opacity: 0.6; transition: transform 0.2s; }
        .card:hover .forward-icon { transform: translateX(5px); opacity: 1; }

        /* Floating Button */
        .fab-container {
            position: fixed;
            bottom: 30px; left: 0; width: 100%;
            display: flex; justify-content: center;
            pointer-events: none; z-index: 1000;
        }

        .fab-btn {
            pointer-events: auto;
            background: var(--primary-green); color: white;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            padding: 15px 35px; border-radius: 50px;
            font-size: 1.3rem; font-weight: 700;
            box-shadow: 0 8px 25px rgba(0, 143, 104, 0.4);
            transition: transform 0.2s, background 0.2s;
        }

        .fab-btn:hover { transform: scale(1.05); background: #007a58; }
        .fab-btn svg { width: 26px; height: 26px; fill: white; }

        /* MODAL / POPUP CSS */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: var(--card-bg);
            width: 90%;
            max-width: 550px;
            max-height: 85vh; /* Fixed height ratio so it doesn't cross screen */
            border-radius: 20px;
            box-shadow: var(--shadow-modal);
            display: flex;
            flex-direction: column;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .modal-overlay.active .modal-container {
            transform: scale(1) translateY(0);
        }

        /* Sticky Header inside Modal */
        .modal-header {
            padding: 20px 25px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-title {
            color: var(--primary-green);
            font-size: 1.4rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .close-btn {
            background: var(--badge-red-bg);
            border: none;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        .close-btn:hover { background: #fda4af; transform: rotate(90deg); }
        .close-btn svg { width: 18px; height: 18px; fill: var(--badge-red-text); }

        /* Scrollable Body inside Modal */
        .modal-body {
            padding: 20px 25px;
            overflow-y: auto;
            flex: 1;
            background: #f8fafc;
        }

        /* Custom Scrollbar for Modal */
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .modal-body::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
        }

        .file-item:last-child { margin-bottom: 0; }
        .file-name { color: var(--text-dark); font-weight: 600; font-size: 1rem; word-break: break-word; padding-right: 10px; }
        .file-count {
            background: var(--primary-green); color: #ffffff;
            font-size: 0.95rem; font-weight: 700;
            padding: 4px 12px; border-radius: 20px; white-space: nowrap;
        }

        /* Loader */
        .loader-container { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; padding: 50px; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border-color); border-top: 4px solid var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { color: var(--primary-green); font-weight: 700; font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- Security Script (Disable Inspect & Right Click) -->
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(e.key)) || 
                (e.ctrlKey && ['U', 'u'].includes(e.key)) ||
                (e.metaKey && e.altKey && ['I', 'J', 'U', 'i', 'j', 'u'].includes(e.key)) ||
                (e.metaKey && e.shiftKey && ['C', 'c'].includes(e.key))
            ) {
                e.preventDefault();
                window.location.replace("https://imsbg.github.io/odiabhasa/");
            }
        });
    </script>

    <!-- Header Section -->
    <div class="header-container">
        <div class="header-left">
            <h1>ବିଦ୍ୟାଳୟ ବହି</h1>
            <p>୧ମ ରୁ ୮ମ ନୂତନ ସଂସ୍କରଣ ବହି ଡାଉନଲୋଡ ବିବରଣୀ</p>
        </div>
        
        <div class="header-middle">
            <div class="total-box">
                <svg viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,1 22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2M12,17L17,12H14V8H10V12H7L12,17Z" /></svg>
                <div class="total-info">
                    <span class="total-title">ସର୍ବମୋଟ ଡାଉନଲୋଡ୍</span>
                    <span class="total-number" id="global-total-downloads">୦</span>
                </div>
            </div>
        </div>

        <div class="header-right">
            <div class="live-badge">
                <div class="dot"></div>ଲାଇଭ୍
            </div>
            <div class="datetime-text" id="datetime">ସମୟ ଲୋଡ୍ ହେଉଛି...</div>
        </div>
    </div>

    <!-- Main Grid Section -->
    <div class="grid-container" id="data-container">
        <div class="loader-container">
            <div class="spinner"></div>
            <div class="loader-text">ତଥ୍ୟ ଅଣାଯାଉଛି...</div>
        </div>
    </div>

    <!-- Floating Play Store Button -->
    <div class="fab-container">
        <a href="https://play.google.com/store/apps/details?id=in.sandeep.odiabhasa" target="_blank" class="fab-btn">
            <svg viewBox="0 0 24 24"><path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" /></svg>
            ପ୍ଲେ ଷ୍ଟୋରରୁ ଆଣନ୍ତୁ
        </a>
    </div>

    <!-- POPUP / MODAL OVERLAY -->
    <div class="modal-overlay" id="fileModal" onclick="closeModal()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <!-- Fixed Header with Close Button -->
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">ସଂସ୍କରଣ ନାମ</div>
                <button class="close-btn" onclick="closeModal()">
                    <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" /></svg>
                </button>
            </div>
            <!-- Scrollable List -->
            <div class="modal-body" id="modalBody">
                <!-- Data will be injected here via JS -->
            </div>
        </div>
    </div>

    <script>
        const apiUrl = "https://api.github.com/repos/odiaschoolbooks/odiabooks/releases";
        const odiaDigits = ['୦', '୧', '୨', '୩', '୪', '୫', '୬', '୭', '୮', '୯'];
        
        let globalReleasesData = []; // Store data for popup

        function toOdiaNumber(num) {
            return num.toString().replace(/[0-9]/g, digit => odiaDigits[digit]);
        }

        function formatFileName(filename) {
            let withoutExt = filename.replace(/\.pdf$/i, '');
            return withoutExt.replace(/\./g, ' ');
        }

        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            let dateString = now.toLocaleDateString('en-US', options).replace(',', ',');
            document.getElementById('datetime').innerText = dateString;
        }

        // Popup Functions
        function openModal(index) {
            const release = globalReleasesData[index];
            const releaseName = release.name || release.tag_name || "ଅଜ୍ଞାତ ସଂସ୍କରଣ";
            
            document.getElementById('modalTitle').innerText = releaseName;
            
            let filesHtml = '';
            release.assets.forEach(asset => {
                filesHtml += `
                    <div class="file-item">
                        <span class="file-name">${formatFileName(asset.name)}</span>
                        <span class="file-count">${toOdiaNumber(asset.download_count)}</span>
                    </div>
                `;
            });

            document.getElementById('modalBody').innerHTML = filesHtml || '<div style="text-align:center; color:#94a3b8;">କୌଣସି ଫାଇଲ୍ ନାହିଁ</div>';
            
            document.getElementById('fileModal').classList.add('active');
            document.body.classList.add('modal-open'); // Prevent background scroll
        }

        function closeModal() {
            document.getElementById('fileModal').classList.remove('active');
            document.body.classList.remove('modal-open'); // Allow background scroll
        }

        // Handle Escape key to close modal
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                closeModal();
            }
        });

        async function fetchDownloadStats() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Network response failed');
                
                globalReleasesData = await response.json();

                let htmlContent = '';
                let globalTotal = 0;

                globalReleasesData.forEach((release, index) => {
                    let releaseTotal = 0;
                    release.assets.forEach(asset => {
                        releaseTotal += asset.download_count;
                        globalTotal += asset.download_count;
                    });

                    const releaseName = release.name || release.tag_name || "ଅଜ୍ଞାତ ସଂସ୍କରଣ";

                    // Card Design without Accordion (Added onclick event)
                    htmlContent += `
                        <div class="card" onclick="openModal(${index})">
                            <div class="card-title-area">
                                <span class="card-title">${releaseName}</span>
                                <div class="card-stats">
                                    <span class="stat-number">${toOdiaNumber(releaseTotal)}</span>
                                    <span class="stat-text">ଡାଉନଲୋଡ୍</span>
                                </div>
                            </div>
                            <!-- Right Arrow Icon instead of Chevron -->
                            <svg class="forward-icon" viewBox="0 0 24 24">
                                <path d="M4,11V13H16L10.5,18.5L11.92,19.92L19.84,12L11.92,4.08L10.5,5.5L16,11H4Z" />
                            </svg>
                        </div>
                    `;
                });

                document.getElementById('data-container').innerHTML = htmlContent;
                document.getElementById('global-total-downloads').innerText = toOdiaNumber(globalTotal);

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('data-container').innerHTML = `
                    <div class="loader-container">
                        <div class="loader-text" style="color:#e11d48;">ତଥ୍ୟ ଆଣିବାରେ ବିଫଳ ହେଲା। ଦୟାକରି ଇଣ୍ଟରନେଟ୍ ଯାଞ୍ଚ କରନ୍ତୁ।</div>
                    </div>`;
            }
        }

        setInterval(updateDateTime, 1000); 
        updateDateTime(); 
        fetchDownloadStats(); 
        setInterval(fetchDownloadStats, 60000);
    </script>
</body>
</html>
